# Jekyll Site Configuration - Minimal Academic Portfolio

# Basic Site Settings
locale: "en-US"
title: "Lijing Zhu | Data Science & ML Research"
title_separator: "-"
name: &name "Lijing Zhu"
description: &description "Academic portfolio and research projects in data science and machine learning"
url: "https://lijingzhu.github.io"
baseurl: ""
repository: "https://github.com/lijingzhu1/lijingzhu.github.io"

# Site Author
author:
  name: "Lijing Zhu"
  bio: "Ph.D. in Data Science from Bowling Green State University, specializing in machine learning and graph-based deep learning. Data scientist at University of Houston-Clear Lake."
  location: "TX"
  employer: "University of Houston-Clear Lake"
  email: "zhul@uhcl.edu"
  
  # Academic & Professional Links
  googlescholar: "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  github: "lijingzhu1"
  linkedin: # "your-linkedin-username"
  orcid: "https://orcid.org/yourorcidurl"

# Publication Categories
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# Site Settings
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

# Markdown & Processing
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: true
      share: true

# File Handling
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .bundle
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
encoding: "utf-8"

# Output & Permalinks
permalink: /:categories/:title/
timezone: "Etc/UTC"

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# RSS Feed
atom_feed:
  hide: false
